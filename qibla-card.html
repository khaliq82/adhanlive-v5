<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Qibla Finder — AdhanLive</title>
<meta name="description" content="Find the Qibla direction from anywhere. Powered by AdhanLive.">
<meta property="og:title" content="Qibla Finder — AdhanLive">
<meta property="og:image" content="https://www.adhanlive.com/preview.jpg">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;--border:rgba(255,255,255,0.08);
  --gold:#00d4ff;--text:#fff;
  --text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.25);
}
html,body{
  height:100dvh;background:#0a0a0a;color:var(--text);
  font-family:'Geist',sans-serif;
  display:flex;justify-content:center;align-items:flex-start;
  overflow:hidden;
}
.card-wrap{
  width:100%;max-width:480px;height:100dvh;
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.logo-text{font-size:13px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.logo-text span{color:var(--gold);}
.hijri-date{font-size:9px;color:rgba(0,212,255,0.6);letter-spacing:0.04em;}

/* ── BODY ── */
.card-body{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px 20px 70px;overflow:hidden;gap:16px;
}

/* ── STATE SCREENS ── */
.state-screen{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;text-align:center;padding:0 20px;
}
.state-icon{font-size:52px;line-height:1;}
.state-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.state-sub{font-size:13px;color:var(--text3);line-height:1.6;max-width:280px;}
.state-btn{
  padding:14px 36px;border-radius:10px;border:none;
  background:var(--gold);color:#000;
  font-size:13px;font-weight:700;font-family:'Geist',sans-serif;
  cursor:pointer;letter-spacing:0.04em;margin-top:4px;
}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid rgba(0,212,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-text{font-size:13px;color:var(--text3);}

/* ── COMPASS ── */
.compass-scene{
  display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;
}
.city-label{font-size:13px;color:var(--text2);text-align:center;}
.city-label span{color:#fff;font-weight:600;}

.compass-wrap{
  position:relative;
  width:min(280px,78vw);height:min(280px,78vw);flex-shrink:0;
}

/* Metallic bezel */
.compass-bezel{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    from 0deg,
    #1a1a1a 0deg,#4a4a4a 20deg,#2a2a2a 40deg,#5a5a5a 60deg,
    #2a2a2a 80deg,#4a4a4a 100deg,#1a1a1a 120deg,#4a4a4a 140deg,
    #2a2a2a 160deg,#5a5a5a 180deg,#2a2a2a 200deg,#4a4a4a 220deg,
    #1a1a1a 240deg,#4a4a4a 260deg,#2a2a2a 280deg,#5a5a5a 300deg,
    #2a2a2a 320deg,#4a4a4a 340deg,#1a1a1a 360deg
  );
  box-shadow:
    0 8px 40px rgba(0,0,0,0.9),
    inset 0 2px 0 rgba(255,255,255,0.15),
    inset 0 -2px 0 rgba(0,0,0,0.5);
}

/* Static compass face */
.compass-face{
  position:absolute;inset:12px;border-radius:50%;
  background:radial-gradient(ellipse at 35% 30%,#12122a 0%,#080818 55%,#030310 100%);
  box-shadow:inset 0 4px 16px rgba(0,0,0,0.9),0 0 0 1px rgba(0,212,255,0.06);
  overflow:hidden;
}
.compass-face::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-conic-gradient(rgba(255,255,255,0.05) 0deg 1deg,transparent 1deg 6deg);
  mask:radial-gradient(circle,transparent 86%,black 87%,black 92%,transparent 93%);
  -webkit-mask:radial-gradient(circle,transparent 86%,black 87%,black 92%,transparent 93%);
}

/* Cardinal labels — FIXED on face */
.face-n,.face-s,.face-e,.face-w{
  position:absolute;font-size:11px;font-weight:800;letter-spacing:0.06em;pointer-events:none;
}
.face-n{top:8px;left:50%;transform:translateX(-50%);color:rgba(255,70,70,0.9);}
.face-s{bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);}
.face-e{right:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);}
.face-w{left:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);}

/* Alignment glow */
.align-glow{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(196,162,74,0.15) 0%,transparent 65%);
  opacity:0;transition:opacity 0.4s;pointer-events:none;
}
.align-glow.active{opacity:1;animation:glowRing 1s ease-in-out infinite;}
@keyframes glowRing{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* NEEDLE — rotates to point at Qibla */
.needle-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:5;
  /* transition removed for real-time response */
}
.needle{
  position:absolute;
  width:10px;
  top:14%;bottom:22%;
  left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;
  transform-origin:50% calc(100% * 0.72 / (0.72+0.28));
}
/* Gold tip pointing to Qibla */
.needle-north{
  flex:0.72;
  clip-path:polygon(50% 0%,100% 100%,50% 85%,0% 100%);
  background:linear-gradient(to bottom,#fff8a0 0%,#e8c84a 30%,#c4a22a 65%,#7a5c14 100%);
  filter:drop-shadow(0 0 8px rgba(196,162,74,0.8));
}
/* Dark tail */
.needle-south{
  flex:0.28;
  clip-path:polygon(50% 100%,100% 0%,50% 15%,0% 0%);
  background:linear-gradient(to top,#111 0%,#444 100%);
}

/* Kaaba on rim */
.kaaba-rim{
  position:absolute;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  z-index:6;
  margin-left:-12px;margin-top:-12px;
  transition:filter 0.3s;
}
.kaaba-rim.aligned{
  animation:kaabaGlow 0.8s ease-in-out infinite;
}
@keyframes kaabaGlow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(196,162,74,0.9));}
  50%{filter:drop-shadow(0 0 20px rgba(255,220,50,1));}
}

/* Center jewel */
.compass-center{
  position:absolute;width:12px;height:12px;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,#fff 0%,#aaa 60%,#666 100%);
  box-shadow:0 0 8px rgba(255,255,255,0.5);z-index:8;
}

/* ── TURN GUIDANCE ── */
.turn-guide{
  font-size:18px;font-weight:700;color:#fff;
  letter-spacing:0.04em;text-align:center;
  min-height:28px;
  animation:guidePulse 0.8s ease-in-out infinite;
}
@keyframes guidePulse{0%,100%{opacity:0.5;}50%{opacity:1;}}

/* ── ALIGNED MESSAGE ── */
.aligned-msg{
  font-size:16px;font-weight:700;color:#e8c84a;
  text-align:center;letter-spacing:0.02em;
  opacity:0;transition:opacity 0.4s;min-height:24px;
}
.aligned-msg.visible{opacity:1;}

/* ── DISTANCE ── */
.distance-box{
  text-align:center;
  padding:12px 24px;
  border:1px solid var(--border);border-radius:10px;
  width:100%;
}
.distance-val{font-size:22px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
.distance-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:3px;}

/* ── FOOTER ── */
.card-footer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;background:rgba(0,0,0,0.95);
  border-top:1px solid rgba(0,212,255,0.3);text-decoration:none;
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  box-shadow:0 -4px 20px rgba(0,0,0,0.8);z-index:100;
}
.footer-text{font-size:12px;color:rgba(255,255,255,0.5);}
.footer-text span{color:var(--gold);font-weight:700;font-size:13px;}
.footer-arrow{font-size:13px;color:var(--gold);font-weight:700;}
</style>
</head>
<body>
<div class="card-wrap">

<div class="card-header">
  <a class="logo" href="https://www.adhanlive.com">
    <div class="logo-dot"></div>
    <div class="logo-text">Adhan<span>Live</span></div>
  </a>
  <div class="hijri-date" id="hijri-date">Qibla Finder</div>
</div>

<div class="card-body" id="card-body">
  <div class="state-screen">
    <div class="state-icon">🕋</div>
    <div class="state-title">Find Your Qibla</div>
    <div class="state-sub">Uses your GPS location to show the exact Qibla direction.</div>
    <button class="state-btn" onclick="startFlow()">Find Qibla Direction</button>
  </div>
</div>

<a class="card-footer" href="https://www.adhanlive.com">
  <span style="font-size:14px;">🌍</span>
  <span class="footer-text">Powered by <span>AdhanLive.com</span></span>
  <span class="footer-arrow">→</span>
</a>
</div>

<script>
const KAABA_LAT=21.4225,KAABA_LNG=39.8262,D=Math.PI/180;

function toHijri(date){
  const jd=Math.floor((date.getTime()/86400000)+2440587.5);
  let l=jd-1948440+10632;const n=Math.floor((l-1)/10631);l=l-10631*n+354;
  const j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const mo=Math.floor((24*l)/709),day=l-Math.floor((709*mo)/24),yr=30*n+j-30;
  const hm=["Muharram","Safar","Rabi ul-Awwal","Rabi ul-Thani","Jumadal Awwal","Jumadal Thani","Rajab","Sha'ban","Ramadan","Shawwal","Dhul Qa'dah","Dhul Hijjah"];
  return `${day} ${hm[mo-1]} ${yr} AH`;
}
document.getElementById('hijri-date').textContent=toHijri(new Date());

function calcQibla(lat,lng){
  const y=Math.sin((KAABA_LNG-lng)*D)*Math.cos(KAABA_LAT*D);
  const x=Math.cos(lat*D)*Math.sin(KAABA_LAT*D)-Math.sin(lat*D)*Math.cos(KAABA_LAT*D)*Math.cos((KAABA_LNG-lng)*D);
  return((Math.atan2(y,x)/D)+360)%360;
}
function calcDist(lat,lng){
  const R=6371,dLat=(KAABA_LAT-lat)*D,dLng=(KAABA_LNG-lng)*D;
  const a=Math.sin(dLat/2)**2+Math.cos(lat*D)*Math.cos(KAABA_LAT*D)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.asin(Math.sqrt(a)));
}
function getCity(lat,lng){
  return fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}})
    .then(r=>r.json()).then(d=>{const a=d.address||{};return a.city||a.town||a.village||'Your Location';})
    .catch(()=>'Your Location');
}

let _qibla=0,_dist=0,_cityName='';

// ── RENDER ────────────────────────────────────────────────────
function renderCompass(){
  const bearing=Math.round(_qibla);
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const dir=dirs[Math.round(bearing/45)%8];

  document.getElementById('card-body').innerHTML=`
    <div class="compass-scene">
      <div class="city-label">Qibla from <span>${_cityName}</span></div>
      <div class="compass-wrap">
        <div class="compass-bezel"></div>
        <div class="compass-face">
          <div class="face-n">N</div><div class="face-s">S</div>
          <div class="face-e">E</div><div class="face-w">W</div>
          <div class="kaaba-rim" id="kaaba-rim">🕋</div>
          <div class="needle-wrap" id="needle-wrap" style="transform:rotate(${bearing}deg)">
            <div class="needle">
              <div class="needle-north"></div>
              <div class="needle-south"></div>
            </div>
          </div>
          <div class="compass-center"></div>
        </div>
      </div>
      <div class="turn-guide">Face <strong>${bearing}°&nbsp;${dir}</strong> to face Makkah</div>
      <div class="distance-box">
        <div class="distance-val"><span style="color:#00d4ff;font-weight:800;">${_dist.toLocaleString()} km</span></div>
        <div class="distance-lbl">Distance to Makkah</div>
      </div>
    </div>`;

  // Position Kaaba on rim
  requestAnimationFrame(()=>{
    const kaaba=document.getElementById('kaaba-rim');
    if(!kaaba) return;
    const r=41;
    const rad=(_qibla-90)*D;
    kaaba.style.left=(50+r*Math.cos(rad))+'%';
    kaaba.style.top=(50+r*Math.sin(rad))+'%';
    kaaba.style.transform=`rotate(${_qibla+180}deg)`;
  });
}

// ── FLOW ──────────────────────────────────────────────────────
async function startFlow(){
  document.getElementById('card-body').innerHTML='<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Getting your location...</div></div>';
  try{
    const pos=await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000,enableHighAccuracy:true})
    );
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    _qibla=calcQibla(lat,lng);
    _dist=calcDist(lat,lng);
    _cityName=await getCity(lat,lng);
    renderCompass();
  }catch(err){
    document.getElementById('card-body').innerHTML=`
      <div class="state-screen">
        <div class="state-icon">📍</div>
        <div class="state-title">Location Required</div>
        <div class="state-sub">Please allow location access and try again.</div>
        <button class="state-btn" onclick="startFlow()">Try Again</button>
      </div>`;
  }
}
</script>
</body>
</html>
