<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Qibla Finder — AdhanLive</title>
<meta name="description" content="Find the Qibla direction from anywhere. Powered by AdhanLive.">
<meta property="og:title" content="Qibla Finder — AdhanLive">
<meta property="og:image" content="https://www.adhanlive.com/preview.jpg">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;--border:rgba(255,255,255,0.08);
  --gold:#00d4ff;--text:#fff;
  --text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.25);
}
html,body{
  height:100dvh;background:#0a0a0a;color:var(--text);
  font-family:'Geist',sans-serif;
  display:flex;justify-content:center;align-items:flex-start;
  overflow:hidden;
}
.card-wrap{
  width:100%;max-width:480px;height:100dvh;
  background:var(--bg);display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ── */
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.logo-text{font-size:13px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.logo-text span{color:var(--gold);}
.hijri-date{font-size:9px;color:rgba(0,212,255,0.6);letter-spacing:0.04em;}

/* ── BODY ── */
.card-body{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  padding:16px 20px 70px;overflow:hidden;gap:16px;
}

/* ── STATE SCREENS ── */
.state-screen{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;text-align:center;padding:0 20px;
}
.state-icon{font-size:48px;line-height:1;}
.state-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.state-sub{font-size:13px;color:var(--text3);line-height:1.6;}
.state-btn{
  padding:14px 32px;border-radius:10px;border:none;
  background:var(--gold);color:#000;
  font-size:13px;font-weight:700;font-family:'Geist',sans-serif;
  cursor:pointer;letter-spacing:0.04em;margin-top:4px;
}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid rgba(0,212,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-text{font-size:13px;color:var(--text3);}

/* ── COMPASS SCENE ── */
.compass-scene{
  display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;
}
.city-label{font-size:13px;color:var(--text2);letter-spacing:0.02em;text-align:center;}
.city-label span{color:#fff;font-weight:600;}

/* ── COMPASS WRAP ── */
.compass-outer-wrap{
  position:relative;
  width:min(290px,80vw);height:min(290px,80vw);
  flex-shrink:0;
}

/* Turn guidance text */
.turn-guide{
  font-size:18px;font-weight:700;color:#fff;
  letter-spacing:0.06em;text-align:center;
  animation:guidePulse 0.8s ease-in-out infinite;
  min-height:28px;
}
@keyframes guidePulse{0%,100%{opacity:0.5;}50%{opacity:1;}}

/* Metallic bezel */
.compass-bezel{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    from 0deg,
    #1a1a1a 0deg,#4a4a4a 15deg,#2a2a2a 30deg,
    #5a5a5a 45deg,#2a2a2a 60deg,#4a4a4a 75deg,
    #1a1a1a 90deg,#4a4a4a 105deg,#2a2a2a 120deg,
    #5a5a5a 135deg,#2a2a2a 150deg,#4a4a4a 165deg,
    #1a1a1a 180deg,#4a4a4a 195deg,#2a2a2a 210deg,
    #5a5a5a 225deg,#2a2a2a 240deg,#4a4a4a 255deg,
    #1a1a1a 270deg,#4a4a4a 285deg,#2a2a2a 300deg,
    #5a5a5a 315deg,#2a2a2a 330deg,#4a4a4a 345deg,
    #1a1a1a 360deg
  );
  box-shadow:0 8px 40px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.6);
}

/* Rotating dial */
.compass-dial{
  position:absolute;inset:12px;border-radius:50%;
  background:radial-gradient(ellipse at 35% 30%,#12122a 0%,#080818 55%,#030310 100%);
  box-shadow:inset 0 4px 16px rgba(0,0,0,0.9),0 0 0 1px rgba(0,212,255,0.06);
  transition:transform 0.15s linear;
  overflow:visible;
}
.compass-dial::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-conic-gradient(rgba(255,255,255,0.06) 0deg 1deg,transparent 1deg 6deg);
  mask:radial-gradient(circle,transparent 86%,black 87%,black 92%,transparent 93%);
  -webkit-mask:radial-gradient(circle,transparent 86%,black 87%,black 92%,transparent 93%);
}
.compass-dial::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to bottom,transparent calc(50% - 0.5px),rgba(255,255,255,0.04) calc(50% - 0.5px),rgba(255,255,255,0.04) calc(50% + 0.5px),transparent calc(50% + 0.5px)),
    linear-gradient(to right,transparent calc(50% - 0.5px),rgba(255,255,255,0.04) calc(50% - 0.5px),rgba(255,255,255,0.04) calc(50% + 0.5px),transparent calc(50% + 0.5px));
}

/* Cardinal labels on dial */
.dial-n,.dial-s,.dial-e,.dial-w{position:absolute;font-size:10px;font-weight:800;letter-spacing:0.06em;pointer-events:none;}
.dial-n{top:7px;left:50%;transform:translateX(-50%);color:rgba(255,70,70,0.9);}
.dial-s{bottom:7px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);}
.dial-e{right:7px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);}
.dial-w{left:7px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);}

/* Kaaba marker on dial rim */
.kaaba-marker{
  position:absolute;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-left:-13px;margin-top:-13px;
  z-index:5;transition:filter 0.3s;
}
.kaaba-marker.aligned{
  animation:kaabaGlow 0.8s ease-in-out infinite;
}
@keyframes kaabaGlow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(196,162,74,0.9)) drop-shadow(0 0 20px rgba(255,200,50,0.6));}
  50%{filter:drop-shadow(0 0 20px rgba(196,162,74,1)) drop-shadow(0 0 40px rgba(255,220,80,1));}
}

/* Alignment glow */
.align-glow{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(196,162,74,0.12) 0%,transparent 65%);
  opacity:0;transition:opacity 0.4s;pointer-events:none;
}
.align-glow.active{opacity:1;animation:glowRing 1s ease-in-out infinite;}
@keyframes glowRing{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* Fixed north needle */
.north-needle{
  position:absolute;top:50%;left:50%;
  width:3px;height:38%;
  transform:translateX(-50%) translateY(-96%);
  transform-origin:50% 100%;
  background:linear-gradient(to bottom,rgba(255,60,60,0.95),rgba(255,60,60,0.2));
  clip-path:polygon(50% 0%,100% 100%,50% 82%,0% 100%);
  z-index:6;
}

/* Fixed top alignment dot */
.top-marker{
  position:absolute;top:13px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px rgba(0,212,255,0.8);
  z-index:20;
}

/* Center jewel */
.compass-center{
  position:absolute;width:10px;height:10px;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,#fff 0%,#aaa 60%,#666 100%);
  box-shadow:0 0 8px rgba(255,255,255,0.5);z-index:8;
}

/* ── STATS ── */
.stats-bar{
  display:flex;width:100%;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.stat-item{flex:1;padding:12px 8px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1;}
.stat-lbl{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:4px;}

/* ── ALIGNED MESSAGE ── */
.aligned-msg{
  text-align:center;font-size:16px;font-weight:700;
  color:#e8c84a;letter-spacing:0.02em;
  opacity:0;transition:opacity 0.4s;
}
.aligned-msg.visible{opacity:1;}

/* ── FOOTER ── */
.card-footer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;background:rgba(0,0,0,0.95);
  border-top:1px solid rgba(0,212,255,0.3);text-decoration:none;
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  box-shadow:0 -4px 20px rgba(0,0,0,0.8);z-index:100;
}
.footer-text{font-size:12px;color:rgba(255,255,255,0.5);}
.footer-text span{color:var(--gold);font-weight:700;font-size:13px;}
.footer-arrow{font-size:13px;color:var(--gold);font-weight:700;}
</style>
</head>
<body>
<div class="card-wrap">

<div class="card-header">
  <a class="logo" href="https://www.adhanlive.com">
    <div class="logo-dot"></div>
    <div class="logo-text">Adhan<span>Live</span></div>
  </a>
  <div class="hijri-date" id="hijri-date">Qibla Finder</div>
</div>

<div class="card-body" id="card-body">
  <!-- Initial state -->
  <div class="state-screen" id="screen-start">
    <div class="state-icon">🕋</div>
    <div class="state-title">Find Your Qibla</div>
    <div class="state-sub">Point your phone toward Makkah using your device's live compass.</div>
    <button class="state-btn" onclick="startFlow()">Find Qibla Direction</button>
  </div>
</div>

<a class="card-footer" href="https://www.adhanlive.com">
  <span style="font-size:14px;">🌍</span>
  <span class="footer-text">Powered by <span>AdhanLive.com</span></span>
  <span class="footer-arrow">→</span>
</a>

</div>
<script>
const KAABA_LAT=21.4225,KAABA_LNG=39.8262,D=Math.PI/180;

// Hijri
function toHijri(date){
  const jd=Math.floor((date.getTime()/86400000)+2440587.5);
  let l=jd-1948440+10632;const n=Math.floor((l-1)/10631);l=l-10631*n+354;
  const j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const mo=Math.floor((24*l)/709),day=l-Math.floor((709*mo)/24),yr=30*n+j-30;
  const hm=["Muharram","Safar","Rabi ul-Awwal","Rabi ul-Thani","Jumadal Awwal","Jumadal Thani","Rajab","Sha'ban","Ramadan","Shawwal","Dhul Qa'dah","Dhul Hijjah"];
  return `${day} ${hm[mo-1]} ${yr} AH`;
}
document.getElementById('hijri-date').textContent=toHijri(new Date());

function calcQibla(lat,lng){
  const y=Math.sin((KAABA_LNG-lng)*D)*Math.cos(KAABA_LAT*D);
  const x=Math.cos(lat*D)*Math.sin(KAABA_LAT*D)-Math.sin(lat*D)*Math.cos(KAABA_LAT*D)*Math.cos((KAABA_LNG-lng)*D);
  return((Math.atan2(y,x)/D)+360)%360;
}
function calcDist(lat,lng){
  const R=6371,dLat=(KAABA_LAT-lat)*D,dLng=(KAABA_LNG-lng)*D;
  const a=Math.sin(dLat/2)**2+Math.cos(lat*D)*Math.cos(KAABA_LAT*D)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.asin(Math.sqrt(a)));
}
function getCity(lat,lng){
  return fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}})
    .then(r=>r.json())
    .then(d=>{
      const a=d.address||{};
      return a.city||a.town||a.village||a.county||'Your Location';
    }).catch(()=>'Your Location');
}

let _qibla=0,_dist=0,_cityName='';

// ── SHOW TURN GUIDANCE ───────────────────────────────────────
function showTurnArrow(diff){
  const guide=document.getElementById('turn-guide');
  if(!guide) return;
  const aligned=Math.abs(diff)<5;
  if(aligned){
    guide.style.display='none';
    guide.textContent='';
  } else if(diff>0){
    guide.style.display='block';
    guide.textContent='Turn Right >>>';
  } else {
    guide.style.display='block';
    guide.textContent='<<< Turn Left';
  }
}

// ── RENDER COMPASS ────────────────────────────────────────────
function renderCompass(){
  const bearing=Math.round(_qibla);
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const dir=dirs[Math.round(bearing/45)%8];

  // Kaaba on dial rim
  const rad=(_qibla-90)*D;
  const r=40;
  const kx=50+r*Math.cos(rad);
  const ky=50+r*Math.sin(rad);
  const kRot=_qibla+180;

  document.getElementById('card-body').innerHTML=`
    <div class="compass-scene">
      <div class="city-label">Qibla from <span>${_cityName}</span></div>

      <div class="compass-outer-wrap">


        <div class="compass-bezel"></div>

        <div class="compass-dial" id="compass-dial">
          <div class="dial-n">N</div><div class="dial-s">S</div>
          <div class="dial-e">E</div><div class="dial-w">W</div>
          <div class="kaaba-marker" id="kaaba-marker"
            style="left:${kx}%;top:${ky}%;transform:rotate(${kRot}deg)">🕋</div>
          <div class="align-glow" id="align-glow"></div>
        </div>

        <div class="top-marker"></div>
        <div class="north-needle"></div>
        <div class="compass-center"></div>
      </div>

      <!-- Turn guidance -->
      <div class="turn-guide" id="turn-guide" style="display:none;"></div>

      <div class="aligned-msg" id="aligned-msg">✅ You are facing Makkah &nbsp; الله أكبر</div>

      <div class="stats-bar">
        <div class="stat-item"><div class="stat-val">${_dist.toLocaleString()} km</div><div class="stat-lbl">Distance to Makkah</div></div>
      </div>
    </div>
  `;

  startCompass();
}

// ── COMPASS ───────────────────────────────────────────────────
let _compassActive=false,_smoothHeading=0,_lastRaw=null,_sourceDecided=false,_useWebkit=false;

function startCompass(){
  if(_compassActive) return;
  _compassActive=true;

  window.addEventListener('deviceorientationabsolute', function(e){
    if(!_sourceDecided){
      _sourceDecided=true;
      _useWebkit=false;
    }
    if(!_useWebkit) onOrientation(e);
  }, true);

  window.addEventListener('deviceorientation', function(e){
    if(!_sourceDecided && typeof e.webkitCompassHeading==='number' && !isNaN(e.webkitCompassHeading)){
      _sourceDecided=true;
      _useWebkit=true;
    }
    if(_useWebkit) onOrientation(e);
  }, true);
}

function onOrientation(e){
  let h=null;

  if(_useWebkit){
    // iOS — webkitCompassHeading is degrees from North, clockwise. Use directly.
    if(typeof e.webkitCompassHeading==='number' && !isNaN(e.webkitCompassHeading)){
      h=e.webkitCompassHeading;
    }
  } else {
    // Android absolute — alpha is degrees counterclockwise from North
    if(e.absolute && typeof e.alpha==='number' && e.alpha!==null){
      h=(360-e.alpha+360)%360;
    }
  }

  if(h===null) return;

  // Smooth with shortest-path interpolation to avoid spin
  if(_lastRaw===null){ _lastRaw=h; _smoothHeading=h; }
  let delta=h-_lastRaw;
  if(delta>180) delta-=360;
  if(delta<-180) delta+=360;
  _lastRaw=h;
  _smoothHeading=(_smoothHeading+delta*0.3+360)%360;

  const dial=document.getElementById('compass-dial');
  if(dial) dial.style.transform=`rotate(${-_smoothHeading}deg)`;

  // Diff = how many degrees to turn to face Makkah
  let diff=(_qibla-_smoothHeading+360)%360;
  if(diff>180) diff-=360; // signed: + = turn right, - = turn left

  const aligned=Math.abs(diff)<5;

  // Update turn arrows
  showTurnArrow(diff);

  // Aligned state
  const glow=document.getElementById('align-glow');
  const kaaba=document.getElementById('kaaba-marker');
  const msg=document.getElementById('aligned-msg');
  if(glow) glow.classList.toggle('active',aligned);
  if(kaaba) kaaba.classList.toggle('aligned',aligned);
  if(msg) msg.classList.toggle('visible',aligned);

  // Haptic on alignment
  if(aligned && navigator.vibrate) navigator.vibrate([50,30,50]);
}

// ── MAIN FLOW ─────────────────────────────────────────────────
async function startFlow(){
  // Show loading
  document.getElementById('card-body').innerHTML=`
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-text">Getting your location...</div>
    </div>`;

  try{
    const pos=await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000,enableHighAccuracy:true})
    );
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    _qibla=calcQibla(lat,lng);
    _dist=calcDist(lat,lng);
    _cityName=await getCity(lat,lng);

    // iOS compass permission
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      document.getElementById('card-body').innerHTML=`
        <div class="state-screen">
          <div class="state-icon">🧭</div>
          <div class="state-title">Enable Compass</div>
          <div class="state-sub">Allow compass access to show live Qibla direction.</div>
          <button class="state-btn" onclick="requestCompassPermission()">Enable Compass</button>
        </div>`;
    } else {
      renderCompass();
    }
  }catch(err){
    document.getElementById('card-body').innerHTML=`
      <div class="state-screen">
        <div class="state-icon">📍</div>
        <div class="state-title">Location Required</div>
        <div class="state-sub">Please allow location access and try again. Your location is never stored.</div>
        <button class="state-btn" onclick="startFlow()">Try Again</button>
      </div>`;
  }
}

async function requestCompassPermission(){
  try{
    const p=await DeviceOrientationEvent.requestPermission();
    if(p==='granted') renderCompass();
    else{
      document.getElementById('card-body').innerHTML=`
        <div class="state-screen">
          <div class="state-icon">🧭</div>
          <div class="state-title">Compass Access Denied</div>
          <div class="state-sub">Please allow compass access in your browser settings and reload.</div>
          <button class="state-btn" onclick="location.reload()">Reload</button>
        </div>`;
    }
  }catch(e){renderCompass();}
}
</script>
</body>
</html>
